<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>APPOIO | Presença digital</title>

    <!--
  ============================================================================
  PORTFÓLIO / PÁGINA DE VENDAS DA AGÊNCIA — leia antes de editar
  ============================================================================
  Tudo que você precisa mexer está dentro do objeto CONFIG, lá no <script>,
  perto do fim do arquivo. Não precisa tocar no HTML nem no CSS pra:

  1) LOGO/NOME → CONFIG.agencia.logoUrl. Vazio = mostra o nome em texto
     (mesmo esquema de fallback foto→texto que você já usa no cardápio).
     Quando organizar a logo, é só colar o caminho (ex: imagens/logo.png).

  2) CONTATO → CONFIG.agencia.whatsapp / instagram / email.

  3) CADA SERVIÇO → array CONFIG.servicos. Cada item tem:
     - status: "disponivel" ou "em-breve" (controla o CTA de exemplos)
     - pitch: parágrafos de venda (array de strings)
     - diferenciais: bullets ("Recursos e vantagens")
     - precoDesde: número (ou null pra "sob orçamento", caso da Identidade Visual)
       Use isso quando o serviço tem UM valor fixo só.
     - modalidades: [{ nome, preco }] — use isso em vez de precoDesde quando o
       serviço tem versões com valores diferentes (ex: Convite Digital tem 3
       modos de confirmação, Cardápio Digital tem 2 versões). O card mostra
       "A partir de" + o menor valor, e lista cada modalidade com seu preço
       logo abaixo. Se um serviço tiver "modalidades", o "precoDesde" dele é
       ignorado — não precisa dos dois ao mesmo tempo.
     - exemplos: [{ label, url, banner }] com os links do GitHub Pages.
       "banner" é o caminho de uma miniatura/print da página (ex:
       "prints/convite-menino.jpg") — aparece como thumbnail clicável no
       card do serviço, pra chamar mais atenção do que só texto. Enquanto
       o arquivo da imagem não existir, o card mostra um espaço reservado
       com instrução de qual arquivo salvar ali (mesmo esquema dos
       placeholders de foto que você já usa no sub-portfólio de Identidade
       Visual). Na seção "Modelos prontos" lá embaixo, o link continua só
       texto + ícone, sem thumbnail — não precisa mexer em nada pra isso.
       Deixe exemplos: [] pros serviços que ainda não têm modelo no ar — a
       página mostra "em breve" sozinha, sem precisar mexer em mais nada.

  4) REGRAS COMERCIAIS → CONFIG.combos (% de desconto por combo) e
     CONFIG.manutencao (valor avulso + planos). Os valores que estão aí são
     EXEMPLO — troque pelos que você realmente vai praticar.

  5) CORES/FONTES → variáveis no :root do <style>, logo no início.
  ============================================================================
-->

    <style>
      :root {
        /* paleta — azul único, sem alternância de tema */
        --accent: #ff8a3d;
        --accent-2: #37b285;

        --bg: #1f3561;
        --surface: #16233f;
        --surface2: #1c2c4d;
        --text: #f2eee3;
        --muted: #9fb0ce;
        --border: rgba(244, 239, 228, 0.14);
        --grid: rgba(244, 239, 228, 0.05);

        --font-display: "Space Grotesk", sans-serif;
        --font-body: "IBM Plex Sans", sans-serif;
        --font-mono: "IBM Plex Mono", monospace;

        --radius: 16px;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        width: 100%;
        scroll-behavior: smooth;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-body);
      }
      img {
        max-width: 100%;
        display: block;
      }
      section {
        padding: 64px 20px;
        max-width: 1080px;
        margin: 0 auto;
      }
      .eyebrow {
        font-family: var(--font-mono);
        font-size: 12.5px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 10px;
        display: block;
      }
      h1,
      h2,
      h3 {
        font-family: var(--font-display);
        line-height: 1.1;
      }
      h2 {
        font-size: clamp(26px, 4vw, 36px);
        margin-bottom: 14px;
      }
      .section-lead {
        color: var(--muted);
        font-size: 15.5px;
        max-width: 640px;
        margin-bottom: 34px;
        line-height: 1.6;
      }

      a {
        color: inherit;
      }

      /* ============================================================
     HEADER
     ============================================================ */
      header {
        position: sticky;
        top: 0;
        z-index: 30;
        background: color-mix(in srgb, var(--bg) 88%, transparent);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border-bottom: 1px solid var(--border);
      }
      .header-inner {
        max-width: 1080px;
        margin: 0 auto;
        padding: 14px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        position: relative;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .brand img {
        height: 34px;
        width: auto;
      }
      .brand-nome {
        font-family: var(--font-display);
        font-size: 19px;
      }
      nav.principal {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      nav.principal a {
        font-size: 13.5px;
        font-weight: 600;
        text-decoration: none;
        color: var(--muted);
        padding: 8px 12px;
        border-radius: 8px;
      }
      nav.principal a:hover {
        color: var(--text);
        background: var(--surface2);
      }
      .nav-toggle {
        display: none;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        width: 38px;
        height: 38px;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 16px;
        color: var(--text);
      }

      @media (max-width: 720px) {
        .nav-toggle {
          display: flex;
        }
        nav.principal {
          display: none;
          position: absolute;
          top: 100%;
          left: 0;
          right: 0;
          background: var(--surface);
          border-bottom: 1px solid var(--border);
          flex-direction: column;
          gap: 2px;
          padding: 10px 20px 16px;
        }
        nav.principal.aberto {
          display: flex;
        }
        nav.principal a {
          padding: 12px;
        }
      }

      /* ============================================================
     HERO — grid de "planta baixa" no fundo
     ============================================================ */
      .hero {
        max-width: none;
        padding: 70px 20px 60px;
        background-image:
          linear-gradient(var(--grid) 1px, transparent 1px),
          linear-gradient(90deg, var(--grid) 1px, transparent 1px);
        background-size: 32px 32px;
        text-align: center;
      }
      .hero-inner {
        max-width: 720px;
        margin: 0 auto;
      }
      .hero h1 {
        font-size: clamp(32px, 6vw, 54px);
        margin-bottom: 18px;
      }
      .hero h1 span {
        color: var(--accent);
      }
      .hero p {
        color: var(--muted);
        font-size: 16.5px;
        max-width: 560px;
        margin: auto;
        line-height: 1.6;
      }
      b {
        color: var(--accent-2) !important;
      }

      /* ============================================================
     SERVIÇOS — "ficha técnica"
     ============================================================ */
      .servicos-grid {
        display: flex;
        flex-direction: column;
        gap: 22px;
      }
      .servico-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 26px;
        position: relative;
        overflow: hidden;
      }
      .servico-titulo-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
      }
      .servico-nome {
        font-family: var(--font-display);
        font-size: 21px;
      }

      .servico-resumo {
        color: var(--muted);
        font-size: 14px;
        margin-bottom: 16px;
      }
      .servico-pitch p {
        font-size: 14.5px;
        line-height: 1.65;
        margin-bottom: 10px;
      }
      .servico-pitch p:last-child {
        margin-bottom: 0;
      }

      .servico-colunas {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 18px;
        margin: 18px 0;
      }
      .servico-col-titulo {
        font-family: var(--font-mono);
        font-size: 11.5px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--accent);
        margin-bottom: 8px;
      }
      .servico-col ul {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .servico-col li {
        font-size: 13.5px;
        color: var(--text);
        padding-left: 16px;
        position: relative;
      }
      .servico-col li::before {
        content: "—";
        position: absolute;
        left: 0;
        color: var(--muted);
      }

      /* nota de preço estilo recibo */
      .nota-preco {
        margin-top: 18px;
        border: 1px dashed var(--border);
        border-radius: 10px;
        padding: 16px 18px;
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        align-items: center;
        justify-content: space-between;
        background: var(--surface2);
      }
      .nota-preco .preco-principal {
        font-family: var(--font-mono);
      }
      .nota-preco .preco-principal .valor {
        font-size: 24px;
        font-weight: 700;
        color: var(--accent);
      }
      .nota-preco .preco-principal .rotulo {
        font-size: 11.5px;
        color: var(--muted);
        display: block;
      }
      .nota-preco .preco-mensal {
        font-size: 12.5px;
        color: var(--muted);
        max-width: 320px;
        line-height: 1.5;
      }
      .nota-preco .preco-mensal b {
        color: var(--accent-2);
      }
      .modalidades-lista {
        margin-top: 8px;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .modalidades-lista .modalidade-item {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        font-size: 12.5px;
        color: var(--text);
      }
      .modalidades-lista .modalidade-item span:last-child {
        color: var(--accent-2);
        font-weight: 600;
        white-space: nowrap;
      }

      /* cards de exemplo com miniatura (dentro do card de serviço) */
      .servico-exemplos {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 12px;
        margin-top: 18px;
      }
      .exemplo-card {
        display: flex;
        flex-direction: column;
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: hidden;
        text-decoration: none;
        color: var(--text);
        background: var(--surface2);
        transition:
          border-color 0.2s ease,
          transform 0.2s ease;
      }
      .exemplo-card:hover {
        border-color: var(--accent);
        transform: translateY(-2px);
      }
      .exemplo-thumb {
        position: relative;
        aspect-ratio: 16/10;
        background: var(--surface);
        overflow: hidden;
      }
      .exemplo-thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: top center;
      }
      .exemplo-thumb img.hidden {
        display: none;
      }
      .exemplo-thumb .thumb-placeholder {
        display: none;
        position: absolute;
        inset: 0;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 6px;
        text-align: center;
        padding: 10px;
        color: var(--muted);
        background: repeating-linear-gradient(
          135deg,
          var(--surface2) 0px,
          var(--surface2) 8px,
          var(--surface) 8px,
          var(--surface) 16px
        );
      }
      .exemplo-thumb.missing .thumb-placeholder {
        display: flex;
      }
      .exemplo-thumb .thumb-placeholder i {
        font-size: 15px;
        opacity: 0.6;
      }
      .exemplo-thumb .thumb-placeholder code {
        font-family: var(--font-mono);
        font-size: 9.5px;
        line-height: 1.4;
        background: rgba(0, 0, 0, 0.25);
        padding: 3px 6px;
        border-radius: 5px;
        word-break: break-all;
        max-width: 100%;
      }
      .exemplo-info {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 9px 11px;
        font-size: 12.5px;
        font-weight: 600;
      }
      .exemplo-info i {
        font-size: 10.5px;
        color: var(--muted);
        flex-shrink: 0;
      }
      .exemplo-card:hover .exemplo-info i {
        color: var(--accent);
      }

      .servico-links {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 18px;
      }
      .link-exemplo {
        font-size: 13px;
        font-weight: 600;
        text-decoration: none;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px 13px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: var(--text);
      }
      .link-exemplo:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .link-exemplo i {
        font-size: 11px;
      }
      .em-breve-badge {
        font-size: 12.5px;
        color: var(--muted);
        font-style: italic;
      }
      .servico-footer-cta {
        margin-top: 18px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .btn-servico-whats {
        background: var(--accent);
        color: #1a0e04;
        font-weight: 700;
        font-size: 13.5px;
        padding: 10px 16px;
        border-radius: 8px;
        text-decoration: none;
      }

      /* ============================================================
     REGRAS COMERCIAIS (combo / manutenção / adicional)
     ============================================================ */
      .regras-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 18px;
      }
      .regra-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 20px;
      }
      .regra-card h3 {
        font-size: 16px;
        margin-bottom: 10px;
      }
      .regra-card p,
      .regra-card li {
        font-size: 13.5px;
        color: var(--muted);
        line-height: 1.6;
      }
      .regra-card ul {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-top: 8px;
      }
      .regra-card li b {
        color: var(--text);
      }

      /* ============================================================
     PORTFÓLIO / MODELOS PRONTOS
     ============================================================ */
      .portfolio-lista {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .portfolio-linha {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        flex-wrap: wrap;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 14px 18px;
        background: var(--surface);
      }
      .portfolio-linha .nome {
        font-weight: 600;
        font-size: 14.5px;
      }
      .portfolio-linha .links {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      /* ============================================================
     FOOTER + flutuantes
     ============================================================ */
      footer {
        border-top: 1px solid var(--border);
        padding: 40px 20px 90px;
        text-align: center;
      }
      footer .brand-nome {
        display: block;
        margin-bottom: 6px;
      }
      footer .rodape-contato {
        display: flex;
        gap: 14px;
        justify-content: center;
        flex-wrap: wrap;
        margin: 14px 0;
        font-size: 13.5px;
      }
      footer .rodape-contato a {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        text-decoration: none;
        color: var(--accent);
      }
      footer .rodape-legal {
        color: var(--muted);
        font-size: 12px;
        margin-top: 18px;
      }

      .whats-float {
        position: fixed;
        bottom: 18px;
        right: 18px;
        z-index: 25;
        background: #25d366;
        color: #fff;
        width: 56px;
        height: 56px;
        border-radius: 999px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 26px;
        text-decoration: none;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.28);
      }
      .back-to-top {
        position: fixed;
        bottom: 18px;
        left: 18px;
        z-index: 25;
        width: 48px;
        height: 48px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text);
        font-size: 18px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transform: translateY(10px);
        pointer-events: none;
        transition:
          opacity 0.2s ease,
          transform 0.2s ease;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.18);
      }
      .back-to-top.visivel {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
      }

      @media (prefers-reduced-motion: reduce) {
        * {
          transition: none !important;
          animation: none !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-inner">
        <div class="brand" id="brandBox"></div>
        <nav class="principal" id="navPrincipal">
          <a href="#servicos">Serviços</a>
          <a href="#regras-comerciais">Funcionamento</a>
          <a href="#portfolio">Modelos</a>
          <a href="#contato">Contato</a>
        </nav>
        <button
          class="nav-toggle"
          id="navToggle"
          aria-label="Abrir menu"
          aria-expanded="false"
        >
          <i class="fa-solid fa-bars"></i>
        </button>
      </div>
    </header>

    <section class="hero">
      <div class="hero-inner">
        <span class="eyebrow">Presença digital personalizada</span>
        <!-- <h1 id="heroTitulo">Seu negócio merece <span>mais</span></h1> -->
        <h1 id="heroTitulo">Soluções que <span>trabalham</span> por você</h1>
        <!-- <p id="heroTagline">Soluções que trabalham por você</p> -->
      </div>
    </section>

    <section id="servicos">
      <span class="eyebrow">Serviços</span>
      <!-- <h2>O que faço</h2> -->
      <div class="servicos-grid" id="servicosGrid"></div>
    </section>

    <section id="regras-comerciais">
      <span class="eyebrow">Como funciona</span>
      <!-- <h2>Investimento</h2> -->
      <div class="regras-grid" id="regrasGrid"></div>
    </section>

    <section id="portfolio">
      <span class="eyebrow">Modelos Prontos</span>
      <!-- <h2>Modelos prontos</h2> -->
      <div class="portfolio-lista" id="portfolioLista"></div>
    </section>

    <footer id="contato">
      <!-- <span class="brand-nome" id="footerNome"></span> -->
      <div class="rodape-contato">
        <a id="footerWhats" href="#" target="_blank"
          ><i class="fa-brands fa-whatsapp"></i> Chamar no WhatsApp</a
        >
        <span id="footerEmail"></span>
      </div>
      <div class="rodape-legal"></div>
    </footer>

    <a
      class="whats-float"
      id="whatsFloat"
      href="#"
      target="_blank"
      aria-label="Falar no WhatsApp"
      ><i class="fa-brands fa-whatsapp"></i
    ></a>
    <button class="back-to-top" id="backToTop" aria-label="Voltar ao topo">
      <i class="fa-solid fa-arrow-up"></i>
    </button>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <!-- ícones — Font Awesome via CDN (mesma recomendação da w3schools) -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <script>
      /* ============================================================================
   CONFIG — o único bloco que você deveria precisar editar
   ============================================================================ */
      const CONFIG = {
        agencia: {
          nome: "APPOIO",
          logoUrl: "logo.png", // ex: "imagens/logo.png" — vazio mostra o nome em texto
          whatsapp: "5521975811821",
          email: "", // opcional — deixe vazio se não quiser exibir
        },

        // % de desconto ao fechar mais de um serviço junto — AJUSTE os valores reais
        combos: { duas: 10, tres: 15 },

        // manutenção: valor avulso por solicitação + planos com mensalidade menor
        manutencao: {
          avulsa: 30,
          planos: [
            { nome: "Trimestral", precoMes: 20 },
            { nome: "Semestral", precoMes: 15 },
            { nome: "Anual", precoMes: 10 },
          ],
        },

        adicionalQrCode: 20,

        servicos: [
          {
            id: "convite-digital",
            nome: "Convite Digital",
            status: "disponivel",
            resumo: "Seu evento começa antes mesmo da festa!",
            pitch: [
              "Página animada e interativa que vai muito além de um arquivo engessado, sendo uma experiência imersiva.",
              "Seu convite ganha vida com um design que encanta seus convidados desde o primeiro clique.",
            ],
            diferenciais: [
              "Personalização: fotos, banner, paleta, música, lista de presentes, blocos visíveis etc.",
              "3 versões: 1) Confirmação por WhatsApp; 2) Confirmação por WhatsApp + planilha; 3) Confirmação por WhatsApp + painel visual",
            ],
            // AJUSTE os valores reais de cada modo — estes são só exemplo
            modalidades: [
              { nome: "Confirmação por WhatsApp", preco: 110 },
              { nome: "Confirmação por WhatsApp + planilha", preco: 150 },
              { nome: "Confirmação por WhatsApp + painel visual", preco: 190 },
            ],
            exemplos: [
              {
                label: "Aniversário Menino",

`;

      // ---- menu hamburguer (telas pequenas) ----
      const navToggle = document.getElementById("navToggle");
      const navPrincipal = document.getElementById("navPrincipal");
      function fecharMenu() {
        navPrincipal.classList.remove("aberto");
        navToggle.setAttribute("aria-expanded", "false");
        navToggle.innerHTML = '<i class="fa-solid fa-bars"></i>';
      }
      navToggle.addEventListener("click", () => {
        const aberto = navPrincipal.classList.toggle("aberto");
        navToggle.setAttribute("aria-expanded", String(aberto));
        navToggle.innerHTML = aberto
          ? '<i class="fa-solid fa-xmark"></i>'
          : '<i class="fa-solid fa-bars"></i>';
      });
      navPrincipal.querySelectorAll("a").forEach((a) => {
        a.addEventListener("click", fecharMenu);
      });

      // ---- voltar ao topo ----
      const backToTop = document.getElementById("backToTop");
      let ticking = false;
      function atualizarBackToTop() {
        backToTop.classList.toggle("visivel", window.scrollY > 500);
        ticking = false;
      }
      window.addEventListener(
        "scroll",
        () => {
          if (!ticking) {
            requestAnimationFrame(atualizarBackToTop);
            ticking = true;
          }
        },
        { passive: true },
      );
      atualizarBackToTop();
      backToTop.addEventListener("click", () => {
        const reduz =
          window.matchMedia &&
          window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        window.scrollTo({ top: 0, behavior: reduz ? "auto" : "smooth" });
      });
    </script>
